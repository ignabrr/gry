name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pygbag

      - name: Build games and assemble site
        run: |
          mkdir -p site
          cp index.html site/ 2>/dev/null || true
          for dir in */; do
            name="${dir%/}"
            if [ -f "${dir}main.py" ]; then
              echo "Building $name..."
              pygbag --build "$dir"
              mkdir -p "site/$name"
              cp -r "${dir}build/web/." "site/$name/"
            fi
          done

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
